name: build-app

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "widgets/**"
      - "tools/**"
      - "widgets-catalog.json"
      - "tools-catalog.json"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm install *>&1 | Tee-Object -FilePath npm-install.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build frontend
        shell: pwsh
        run: |
          npm run build *>&1 | Tee-Object -FilePath frontend-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cargo check
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml *>&1 | Tee-Object -FilePath cargo-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build desktop app bundle
        shell: pwsh
        run: |
          npm run tauri build *>&1 | Tee-Object -FilePath cargo-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload desktop app bundle artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ai-agent-bundle-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error

      - name: Upload app build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-build-logs
          path: |
            npm-install.log
            frontend-build.log
            cargo-check.log
            cargo-build.log
          if-no-files-found: warn
