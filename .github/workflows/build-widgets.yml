name: build-widgets

on:
  push:
    branches: ["widgets"]
    paths:
      - "widgets/**"
      - "widgets-catalog.json"
      - ".github/workflows/build-widgets.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  package-widgets:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate and package widgets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path widget-dist | Out-Null
          $widgets = Get-ChildItem widgets -Directory
          foreach ($widget in $widgets) {
            $manifestPath = Join-Path $widget.FullName 'widget.json'
            if (!(Test-Path $manifestPath)) { continue }
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $kind = if ($manifest.kind) { $manifest.kind.ToString().ToLowerInvariant() } else { 'html' }

            if ($kind -eq 'native') {
              $project = Join-Path $widget.FullName $manifest.entry_project
              if (!(Test-Path $project)) { throw "Missing entry_project for $($widget.Name): $project" }

              $publishDir = Join-Path $widget.FullName 'dist'
              if (Test-Path $publishDir) { Remove-Item -LiteralPath $publishDir -Recurse -Force }
              dotnet publish $project -c Release -r win-x64 --self-contained true -o $publishDir
              if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed for $($widget.Name)" }

              $entry = Join-Path $widget.FullName $manifest.entry_executable
              if (!(Test-Path $entry)) { throw "Missing entry_executable target for $($widget.Name): $entry" }
            }
            elseif ($kind -eq 'html') {
              $entry = Join-Path $widget.FullName $manifest.entry_html
              if (!(Test-Path $entry)) { throw "Missing entry_html target for $($widget.Name): $entry" }
            }
            else {
              throw "Unsupported widget kind '$kind' for $($widget.Name)"
            }

            Compress-Archive -Path (Join-Path $widget.FullName '*') -DestinationPath (Join-Path 'widget-dist' ($widget.Name + '.zip')) -Force
          }

      - name: Upload widget artifacts
        uses: actions/upload-artifact@v4
        with:
          name: widgets-packages
          path: widget-dist/*.zip
          if-no-files-found: error

      - name: Stage widget package branch
        if: success()
        shell: pwsh
        run: |
          Copy-Item -LiteralPath 'widgets-catalog.json' -Destination 'widget-dist/widgets-catalog.json' -Force
          $builtAt = (Get-Date).ToUniversalTime().ToString('o')
          @"
          {
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "built_at_utc": "$builtAt"
          }
          "@ | Set-Content -LiteralPath 'widget-dist/build-info.json' -Encoding UTF8

      - name: Publish widget package branch
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: dist-widgets
          publish_dir: widget-dist
          force_orphan: true
