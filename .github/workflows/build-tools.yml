name: build-tools

on:
  push:
    branches: ["tools"]
    paths:
      - "tools/**"
      - "tools-catalog.json"
      - ".github/workflows/build-tools.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  package-tools:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and package tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path tool-dist | Out-Null
          $tools = Get-ChildItem tools -Directory
          foreach ($tool in $tools) {
            $manifestPath = Join-Path $tool.FullName 'tool.json'
            if (!(Test-Path $manifestPath)) { continue }
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            if ($manifest.kind -eq 'power_shell') {
              $entry = Join-Path $tool.FullName $manifest.entry
              if (!(Test-Path $entry)) { throw "Missing PowerShell entry for $($tool.Name): $entry" }
            }
            Compress-Archive -Path (Join-Path $tool.FullName '*') -DestinationPath (Join-Path 'tool-dist' ($tool.Name + '.zip')) -Force
          }

      - name: Upload tool artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tools-packages
          path: tool-dist/*.zip
          if-no-files-found: error

      - name: Stage tool package branch
        if: success()
        shell: pwsh
        run: |
          Copy-Item -LiteralPath 'tools-catalog.json' -Destination 'tool-dist/tools-catalog.json' -Force
          $builtAt = (Get-Date).ToUniversalTime().ToString('o')
          @"
          {
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "built_at_utc": "$builtAt"
          }
          "@ | Set-Content -LiteralPath 'tool-dist/build-info.json' -Encoding UTF8

      - name: Publish tool package branch
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: dist-tools
          publish_dir: tool-dist
          force_orphan: true
