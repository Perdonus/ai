name: build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm install *>&1 | Tee-Object -FilePath npm-install.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build frontend
        shell: pwsh
        run: |
          npm run build *>&1 | Tee-Object -FilePath frontend-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cargo check
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml *>&1 | Tee-Object -FilePath cargo-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build desktop app
        shell: pwsh
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml *>&1 | Tee-Object -FilePath cargo-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload desktop app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ai-agent-windows
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/*.pdb
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            npm-install.log
            frontend-build.log
            cargo-check.log
            cargo-build.log
          if-no-files-found: warn
