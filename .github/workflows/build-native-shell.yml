name: build-native-shell

on:
  push:
    branches: ["main"]
    paths:
      - "native/**"
      - ".github/workflows/build-native-shell.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-native-shell:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.408"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore native shell
        shell: pwsh
        run: |
          msbuild native/AgentShell/AgentShell.csproj /t:Restore /p:Configuration=Release /p:Platform=x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true *>&1 | Tee-Object -FilePath native-restore.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build native shell
        shell: pwsh
        run: |
          $outputDir = 'native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64'
          if (Test-Path $outputDir) { Remove-Item -LiteralPath $outputDir -Recurse -Force }
          msbuild native/AgentShell/AgentShell.csproj /p:Configuration=Release /p:Platform=x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true *>&1 | Tee-Object -FilePath native-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Bundle llama.cpp runtime
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/ggml-org/llama.cpp/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -eq "llama-$($release.tag_name)-bin-win-cpu-x64.zip" } | Select-Object -First 1
          if (-not $asset) { throw 'llama.cpp win-cpu-x64 asset not found.' }
          $zip = Join-Path $env:RUNNER_TEMP 'llama.cpp.zip'
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip
          $output = 'native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/runtimes/llama.cpp'
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          Expand-Archive -LiteralPath $zip -DestinationPath $output -Force

      - name: Bundle Tesseract OCR runtime
        shell: pwsh
        run: |
          choco install tesseract --yes --no-progress
          $source = 'C:\Program Files\Tesseract-OCR'
          if (!(Test-Path $source)) { throw 'Tesseract install not found.' }
          $output = 'native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/runtimes/tesseract'
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          Copy-Item -Path (Join-Path $source '*') -Destination $output -Recurse -Force
          $tessData = Join-Path $output 'tessdata'
          New-Item -ItemType Directory -Force -Path $tessData | Out-Null
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/eng.traineddata' -OutFile (Join-Path $tessData 'eng.traineddata')
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/rus.traineddata' -OutFile (Join-Path $tessData 'rus.traineddata')

      - name: Add simple uninstall script
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path 'native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64' -Filter 'AgentShell.exe' -Recurse -File | Select-Object -First 1
          if (-not $exe) { throw 'AgentShell.exe not found in publish output.' }
          $output = $exe.Directory.FullName
          Copy-Item -LiteralPath 'native/support/unins000.cmd' -Destination (Join-Path $output 'unins000.cmd') -Force
          Write-Host "Using publish output: $output"

      - name: Stage portable package branch
        if: success()
        shell: pwsh
        run: |
          $output = 'native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64'
          if (!(Test-Path $output)) { throw "Build output not found: $output" }
          if (Test-Path 'dist-app') { Remove-Item -LiteralPath 'dist-app' -Recurse -Force }
          New-Item -ItemType Directory -Force -Path 'dist-app' | Out-Null
          Copy-Item -Path (Join-Path $output '*') -Destination 'dist-app' -Recurse -Force
          $builtAt = (Get-Date).ToUniversalTime().ToString('o')
          @"
          {
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "built_at_utc": "$builtAt"
          }
          "@ | Set-Content -LiteralPath 'dist-app/build-info.json' -Encoding UTF8

      - name: Publish portable package branch
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: dist-app
          publish_dir: dist-app
          force_orphan: true

      - name: Upload native shell artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-shell-windows
          path: native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/**
          if-no-files-found: error

      - name: Upload native shell logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-shell-build-logs
          path: |
            native-restore.log
            native-build.log
          if-no-files-found: warn
