name: build-native-shell

on:
  push:
    branches: ["main"]
    paths:
      - "native/**"
      - ".github/workflows/build-native-shell.yml"
  workflow_dispatch:

jobs:
  windows-native-shell:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore native shell
        shell: pwsh
        run: |
          msbuild native/AgentShell/AgentShell.csproj /restore /p:Configuration=Release /p:Platform=x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true *>&1 | Tee-Object -FilePath native-restore.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build native shell
        shell: pwsh
        run: |
          msbuild native/AgentShell/AgentShell.csproj /p:Configuration=Release /p:Platform=x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true *>&1 | Tee-Object -FilePath native-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Add simple uninstall script
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path 'native/AgentShell/bin' -Filter 'AgentShell.exe' -Recurse -File | Select-Object -First 1
          if (-not $exe) { throw 'AgentShell.exe not found in publish output.' }
          $output = $exe.Directory.FullName
          Copy-Item -LiteralPath 'native/support/unins000.cmd' -Destination (Join-Path $output 'unins000.cmd') -Force
          Write-Host "Using build output: $output"

      - name: Upload native shell artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-shell-windows
          path: native/AgentShell/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/**
          if-no-files-found: error

      - name: Upload native shell logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-shell-build-logs
          path: |
            native-restore.log
            native-build.log
          if-no-files-found: warn
