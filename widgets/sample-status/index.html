<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Status</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        color: #f7f7f3;
        background:
          radial-gradient(circle at top right, rgba(255, 179, 77, 0.28), transparent 30%),
          linear-gradient(160deg, #1a2328, #0d1419);
        display: grid;
        place-items: center;
      }

      .card {
        width: min(100%, 260px);
        padding: 20px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      .eyebrow {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 11px;
        color: #ffca87;
      }

      h1 {
        margin: 8px 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: rgba(247, 247, 243, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">Runtime Widget</p>
      <h1>Ready</h1>
      <p>Drop new widgets into the repo or install them from GitHub.</p>
    </div>
  </body>
  </html>
